<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <h1>TaskMaster</h1>
            
            <!-- 项目管理 -->
            <div class="category-management">
                <div class="category-header">
                    <button id="add-category-btn">添加项目</button>
                    <button id="open-archive-btn">归档项目</button>
                </div>
                <div class="category-list" id="category-list">
                    <!-- 分类列表将通过JavaScript动态添加 -->
                </div>
            </div>
            
            <!-- 添加分类弹窗 -->
            <div class="modal" id="add-category-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加项目</h3>
                        <button id="close-category-modal" class="close-btn">✕</button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="category-name" placeholder="输入项目名称">
                    </div>
                    <div class="modal-footer">
                        <button id="save-category-btn">保存</button>
                        <button id="cancel-category-btn">取消</button>
                    </div>
                </div>
            </div>
            

            
            <!-- 添加卡片弹窗 -->
            <div class="modal" id="add-card-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加新任务卡片</h3>
                        <button id="close-add-card-modal" class="close-btn" onclick="hideAddCardForm()">✕</button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="card-title-modal" placeholder="任务卡片标题">
                        <input type="hidden" id="selected-category" value="">
                    </div>
                    <div class="modal-footer">
                        <button id="add-card-modal-btn">添加卡片</button>
                        <button id="cancel-add-card" onclick="hideAddCardForm()">取消</button>
                    </div>
                </div>
            </div>
            

            
            <!-- 回收站弹窗 -->
            <div class="modal" id="recycle-bin-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>回收站</h3>
                        <button id="close-recycle-bin-modal" class="close-btn">✕</button>
                    </div>
                    <div class="modal-body">
                        <div id="recycled-cards-list"></div>
                        <p id="recycle-bin-empty" style="display: none; text-align: center; color: #666;">回收站为空</p>
                    </div>
                    <div class="modal-footer">
                        <button id="empty-recycle-bin-btn">清空回收站</button>
                        <button id="close-recycle-bin-btn">关闭</button>
                    </div>
                </div>
            </div>
            
            <!-- 归档项目弹窗 -->
            <div class="modal" id="archive-modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>归档项目</h3>
                        <button id="close-archive-modal" class="close-btn">✕</button>
                    </div>
                    <div class="modal-body">
                        <div id="archived-cards-list"></div>
                        <p id="archive-empty" style="display: none; text-align: center; color: #666;">暂无归档项目</p>
                    </div>
                    <div class="modal-footer">
                        <button id="close-archive-btn">关闭</button>
                    </div>
                </div>
            </div>
            
            <!-- 数据管理 -->
            <div class="data-management">
                <h2>数据管理</h2>
                <button id="export-all-btn">导出所有数据</button>
                <button id="import-btn">导入数据</button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
            

            
            <!-- 分类筛选 -->
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="starred">星标卡片</button>
                <!-- 筛选按钮将通过JavaScript动态添加 -->
            </div>
            
            <!-- 回收站 -->
            <div class="recycle-bin">
                <h2>回收站</h2>
                <button id="open-recycle-bin">查看回收站</button>
                <p class="recycle-info">删除的卡片将在30天后自动删除</p>
            </div>
            
            <!-- 用户认证 -->
            <div class="user-auth">
                <h2>用户认证</h2>
                <div id="auth-container">
                    <button id="login-btn">登录</button>
                    <button id="register-btn">注册</button>
                </div>
                <div id="user-info" style="display: none;">
                    <p>欢迎, <span id="user-email"></span></p>
                    <button id="logout-btn">退出</button>
                </div>
            </div>
            

        </div>
        
        <!-- 右侧内容 -->
        <div class="main-content">
            <!-- 顶部操作栏 -->
            <div class="top-bar">
                <div class="top-actions">
                    <!-- 搜索功能 -->
                    <div class="main-search">
                        <input type="text" id="main-search-input" placeholder="搜索卡片关键词...">
                    </div>
                    <!-- 筛选按钮 -->
                    <div class="main-filter">
                        <button class="filter-btn active" data-category="all">全部</button>
                        <button class="filter-btn" data-category="starred">星标卡片</button>
                        <!-- 筛选按钮将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>
            
            <!-- 分类看板区域 -->
            <div class="kanban-board" id="kanban-board">
                <!-- 看板列将通过JavaScript动态添加 -->
            </div>
            
            <!-- 已结束区域 -->
            <div class="completed-section">
                <div class="section-header">
                    <h2>已结束</h2>
                </div>
                <div class="cards-container" id="completed-cards"></div>
            </div>
        </div>
        
        <!-- 卡片详情页 -->
        <div class="card-detail" id="card-detail">
            <div class="card-detail-content">
                <div class="card-detail-header">
                    <div class="header-actions">
                        <button id="close-detail-btn">关闭</button>
                        <button id="rename-card-btn">重命名</button>
                        <button id="export-card-btn">导出</button>
                        <button id="delete-card-btn" class="delete-btn">删除</button>
                    </div>
                    <h2 id="detail-title">任务详情</h2>
                </div>
                <div class="detail-left">
                    <h3>任务清单</h3>
                    <div class="detail-checklist" id="detail-checklist"></div>
                    <div class="add-checklist-item">
                        <input type="text" id="detail-checklist-input" placeholder="添加清单项">
                        <div class="custom-date-picker">
                            <input type="text" id="detail-checklist-due-date" class="due-date-input" placeholder="选择日期" readonly>
                            <div class="calendar-popup" id="calendar-popup">
                                <div class="calendar-header">
                                    <button class="calendar-prev">&lt;</button>
                                    <h3 class="calendar-title"></h3>
                                    <button class="calendar-next">&gt;</button>
                                </div>
                                <div class="calendar-body">
                                    <div class="calendar-weekdays">
                                        <span>一</span>
                                        <span>二</span>
                                        <span>三</span>
                                        <span>四</span>
                                        <span>五</span>
                                        <span>六</span>
                                        <span>日</span>
                                    </div>
                                    <div class="calendar-days"></div>
                                </div>
                                <div class="calendar-footer">
                                    <button class="calendar-clear">清除</button>
                                    <button class="calendar-today">今天</button>
                                </div>
                            </div>
                        </div>
                        <button id="add-detail-checklist-btn">添加</button>
                    </div>
                    <div class="card-note">
                        <h4>备注</h4>
                        <textarea id="card-note-input" placeholder="添加备注..."></textarea>
                    </div>
                </div>
                <div class="detail-right">
                    <h3>完成进度</h3>
                    <div class="progress-container" id="progress-container"></div>
                    <div class="card-meta">
                        <div class="meta-item">
                            <span>分类：</span>
                            <span id="detail-category"></span>
                        </div>
                        <div class="meta-item">
                            <span>创建时间：</span>
                            <span id="detail-created"></span>
                        </div>
                        <div class="meta-item">
                            <span>星标：</span>
                            <button id="star-btn" class="star-btn">
                                <span class="star-icon">☆</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 清单项目详情弹窗 -->
        <div class="card-detail" id="checklist-item-detail">
            <div class="card-detail-content">
                <div class="card-detail-header">
                    <div class="header-actions">
                        <button id="close-item-detail-btn" class="header-btn close-btn">✕</button>
                    </div>
                    <div class="header-title">
                        <input type="text" id="item-text" class="item-title-input" placeholder="输入项目标题">
                    </div>
                </div>
                
                <div class="item-description">
                    <div class="description-header">
                        <button class="description-btn active">复盘/总结</button>
                    </div>
                    <textarea id="item-note" class="description-textarea" placeholder="添加复盘/总结..."></textarea>
                </div>
                
                <div class="item-meta">
                    <div class="meta-row">
                        <label for="item-due-date" class="meta-label">截止时间：</label>
                        <div class="custom-date-picker">
                            <input type="text" id="item-due-date" class="meta-input due-date-input" placeholder="选择日期" readonly>
                            <div class="calendar-popup" id="item-calendar-popup">
                                <div class="calendar-header">
                                    <button class="calendar-prev">&lt;</button>
                                    <h3 class="calendar-title"></h3>
                                    <button class="calendar-next">&gt;</button>
                                </div>
                                <div class="calendar-body">
                                    <div class="calendar-weekdays">
                                        <span>一</span>
                                        <span>二</span>
                                        <span>三</span>
                                        <span>四</span>
                                        <span>五</span>
                                        <span>六</span>
                                        <span>日</span>
                                    </div>
                                    <div class="calendar-days"></div>
                                </div>
                                <div class="calendar-footer">
                                    <button class="calendar-clear">清除</button>
                                    <button class="calendar-today">今天</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="meta-row">
                        <label for="item-related-card" class="meta-label">关联卡片：</label>
                        <select id="item-related-card" class="meta-input">
                            <option value="">无</option>
                            <!-- 卡片选项将通过JavaScript动态添加 -->
                        </select>
                    </div>
                    <div class="meta-row">
                        <label class="meta-label">附件：</label>
                        <input type="file" id="item-files" class="file-input" multiple style="display: none;">
                        <button class="upload-btn" onclick="document.getElementById('item-files').click()">上传文件</button>
                        <div id="item-file-list" class="file-list"></div>
                    </div>
                </div>
                <div class="item-actions">
                    <button id="delete-item-btn" class="delete-btn">删除</button>
                    <button id="save-item-detail-btn" class="save-btn">保存</button>
                    <button id="cancel-item-detail-btn" class="cancel-btn">取消</button>
                </div>
            </div>
        </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase SDK (使用 8.x 版本，非模块化) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // 确保Firebase SDK加载完成
        window.addEventListener('load', function() {
            console.log('页面加载完成，检查Firebase SDK...');
            if (typeof firebase !== 'undefined') {
                console.log('Firebase SDK 已加载');
            } else {
                console.error('Firebase SDK 未加载');
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
